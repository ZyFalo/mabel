<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/umb-shield.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <!-- PWA: meta tags para color, status bar iOS y app name al instalar.
         status-bar-style="black": iOS RESERVA los píxeles del notch
         para el sistema (texto blanco sobre fondo negro). El viewport
         efectivo de la app empieza por debajo del notch — los layouts
         con h-screen ya no necesitan respetar safe-area-inset-top.
         Antes era "black-translucent" pero requería que cada layout
         padre aplicara padding manualmente y los componentes con
         h-screen ignoraban el padding del root, dejando el contenido
         pegado bajo el notch en iPhone 13 Pro. -->
    <meta name="theme-color" content="#A51916" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Mabel" />
    <meta name="description" content="Mabel IA — Asistente conversacional de psicoeducación en salud mental para estudiantes de la Universidad Manuela Beltrán." />
    <title>Mabel IA</title>
  </head>

  </body>
