<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/umb-shield.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <!-- PWA: meta tags para color, status bar iOS y app name al instalar.
         status-bar-style="black-translucent": la app gana los píxeles
         del notch y el fondo brand rojo se extiende edge-to-edge
         (look immersivo). Cada header (AuthShell, Header, AdminHeader)
         aplica `paddingTop: env(safe-area-inset-top)` para que su
         contenido interno (logo, título) quede DEBAJO del notch sin
         dejar franja negra arriba. Combinación que da el mejor
         resultado visual en iPhone 13 Pro+. -->
    <meta name="theme-color" content="#A51916" />
    <!-- `mobile-web-app-capable` es el estándar W3C (Chrome 31+, Edge,
         Samsung Internet). Apple aún requiere su variante propietaria
         `apple-*` (deprecada pero sin reemplazo oficial en iOS). Mantener
         ambas para cobertura completa Android + iOS sin warnings. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mabel" />
    <meta name="description" content="Mabel IA — Asistente conversacional de psicoeducación en salud mental para estudiantes de la Universidad Manuela Beltrán." />
    <title>Mabel IA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
